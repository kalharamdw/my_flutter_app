name: taskmaster
description: A beautiful productivity app with AI assistant, task management, pomodoro timer, and analytics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10

  # Google Sign-In
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.2
  path: ^1.8.3

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.2
  table_calendar: ^3.0.9
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # HTTP / API
  http: ^1.1.0

  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_local_notifications: ^15.0.0
  timezone: ^0.9.2
  permission_handler: ^11.3.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"